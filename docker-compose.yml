services:
  postgres:
    # pgvector-enabled Postgres 16 (drop-in) so `CREATE EXTENSION vector` in the
    # migrations works locally, matching the managed pgvector Postgres in prod.
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: meetai
      POSTGRES_PASSWORD: meetai
      POSTGRES_DB: meetai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    # AOF persistence so queued jobs survive a Redis restart — the queue's
    # durability story has to hold at every layer, not just in BullMQ.
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata: